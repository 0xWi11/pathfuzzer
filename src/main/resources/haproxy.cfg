global
    log stdout format raw local0
    maxconn 50000

    # 进程和线程设置
    nbthread 4

    # External check配置
    external-check
    insecure-fork-wanted

    # 性能调优参数
    tune.bufsize 32768
    tune.maxrewrite 2048
    tune.maxaccept 128
    tune.recv_enough 10000

    # SSL/TLS优化
    tune.ssl.default-dh-param 2048
    tune.ssl.maxrecord 1400
    tune.ssl.cachesize 100000

    # 内存和连接优化
    tune.rcvbuf.client 262144
    tune.rcvbuf.server 262144
    tune.sndbuf.client 262144
    tune.sndbuf.server 262144

    # 事件系统优化
    tune.maxpollevents 500

    # Docker特殊设置
    daemon
    master-worker

defaults
    mode tcp
    log global
    option tcplog
    option log-health-checks

    # TCP连接超时优化
    timeout connect 5s
    timeout client  300s
    timeout server  300s
    timeout check   10s
    timeout tunnel  1h

    # TCP性能选项
    option tcp-smart-accept
    option tcp-smart-connect
    option splice-auto
    option dontlognull
    option redispatch

    # 错误处理
    retries 2
    option abortonclose

# ============================================
# 原有节点组 - 端口 20808
# ============================================

frontend proxy_front
    bind *:20808
    mode tcp
    option tcplog
    option dontlognull
    tcp-request inspect-delay 5s
    default_backend proxy_back

backend proxy_back
    mode tcp
    balance roundrobin

    # 启用external-check
    option external-check
    external-check path "/usr/bin:/bin"
    external-check command "/usr/local/etc/haproxy/check_node_latency.sh"

    # 连接优化
    option tcp-smart-connect

    # 使用default-server简化配置
    # 注意：external-check需要较长的检查间隔
    default-server check inter 60s fastinter 10s downinter 15s rise 12 fall 1 maxconn 2000 maxqueue 100

    # Hong Kong 8 nodes
    server lb-hk01 host.docker.internal:10801 weight 100

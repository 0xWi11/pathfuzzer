global
    log stdout format raw local0
    maxconn 50000               # 提高最大连接数，TCP模式可以处理更多

    # 进程和线程设置（Docker环境重要）
    nbthread 4                  # 启用多线程，根据容器CPU限制调整

    # 性能调优参数
    tune.bufsize 32768          # 增加缓冲区大小到32KB
    tune.maxrewrite 2048        # 增加重写缓冲区
    tune.maxaccept 128          # TCP模式可以设置更大
    tune.recv_enough 10000      # 接收缓冲区大小

    # SSL/TLS优化（如果使用HTTPS）
    tune.ssl.default-dh-param 2048
    tune.ssl.maxrecord 1400     # 优化SSL记录大小
    tune.ssl.cachesize 100000   # SSL会话缓存大小

    # 内存和连接优化
    tune.rcvbuf.client 262144   # 客户端接收缓冲区
    tune.rcvbuf.server 262144   # 服务器接收缓冲区
    tune.sndbuf.client 262144   # 客户端发送缓冲区
    tune.sndbuf.server 262144   # 服务器发送缓冲区

    # 事件系统优化（Linux）
    tune.maxpollevents 500      # 每次poll的最大事件数

    # Docker特殊设置
    daemon
    master-worker               # 启用master-worker模式，便于信号处理

defaults
    mode tcp                    # 切换到TCP模式
    log global
    option tcplog              # 使用TCP日志格式
    option log-health-checks   # 记录健康检查日志

    # TCP连接超时优化
    timeout connect 5s         # TCP连接建立超时
    timeout client  300s       # 客户端超时，支持长连接
    timeout server  300s       # 服务器超时
    timeout check   10s        # 健康检查超时
    timeout tunnel  1h         # 隧道超时（重要：支持长连接）

    # TCP性能选项
    option tcp-smart-accept    # 智能TCP接受
    option tcp-smart-connect   # 智能TCP连接
    option splice-auto         # 自动使用splice（Linux零拷贝）
    option dontlognull         # 不记录空连接
    option redispatch          # 服务器故障时重新分发

    # 错误处理
    retries 2                  # 减少重试次数，快速故障转移
    option abortonclose        # 客户端关闭时中止服务器连接

# ============================================
# 原有节点组 - 端口 20808
# ============================================

frontend proxy_front
    bind *:20808
    mode tcp                   # 前端TCP模式
    option tcplog
    option dontlognull

    # TCP特定优化
    tcp-request inspect-delay 5s

    default_backend proxy_back

backend proxy_back
    mode tcp                   # 后端TCP模式
    balance roundrobin         # TCP模式下推荐roundrobin或leastconn

    option tcp-check
    tcp-check connect

    # 连接优化
    option tcp-smart-connect

    # 使用default-server简化配置
    default-server check inter 45s fastinter 5s downinter 8s rise 2 fall 2 maxconn 2000 maxqueue 100

    # Hong Kong 8 nodes
    server lb-hk01 host.docker.internal:10801 weight 100

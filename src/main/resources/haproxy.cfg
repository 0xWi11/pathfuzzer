# ============================================

# 统计页面（需要单独的HTTP frontend）
frontend stats_front
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 3s
    stats auth admin:password
    stats admin if TRUE
    stats show-legends
